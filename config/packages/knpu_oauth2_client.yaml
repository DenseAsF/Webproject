knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: app_google_check   # the route for the callback
            redirect_params: {}
            # Request these scopes from Google:
            use_state: true
